<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>GALAGACUS V3: ARMADA RISING</title>
<style>
:root{--cyan:#65f5ff;--pink:#ff52d5;--gold:#ffda6b;--violet:#9a78ff;--green:#62ff9d;--red:#ff5f70}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 22%,#172963 0,#0a1130 28%,#02030a 78%);color:#fff;font-family:Inter,system-ui,-apple-system,Segoe UI,Arial,sans-serif}body{display:grid;place-items:center}
#shell{position:relative;width:min(100vw,calc(100vh * 4 / 3));height:min(100vh,calc(100vw * 3 / 4));aspect-ratio:4/3;overflow:hidden;background:#02030a;border:1px solid rgba(101,245,255,.25);box-shadow:0 0 70px rgba(62,102,255,.24),inset 0 0 70px rgba(0,0,0,.55)}
canvas{display:block;width:100%;height:100%;touch-action:none}
#scan{position:absolute;inset:0;pointer-events:none;background:linear-gradient(rgba(255,255,255,.018) 50%,rgba(0,0,0,.08) 50%),linear-gradient(90deg,rgba(255,0,0,.018),rgba(0,255,0,.01),rgba(0,100,255,.02));background-size:100% 4px,6px 100%;mix-blend-mode:screen;opacity:.4}
#vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 110px rgba(0,0,0,.9)}
#touch{position:absolute;inset:0;pointer-events:none;display:none}.tb{position:absolute;pointer-events:auto;display:grid;place-items:center;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);backdrop-filter:blur(5px);font-weight:900;user-select:none;touch-action:none}
#left{left:18px;bottom:22px;width:64px;height:64px}#right{left:94px;bottom:22px;width:64px;height:64px}#up{left:56px;bottom:92px;width:56px;height:56px}#down{left:56px;bottom:-8px;width:56px;height:56px}#fire{right:18px;bottom:22px;width:82px;height:82px;border-color:rgba(255,82,213,.5)}#bomb{right:112px;bottom:36px;width:58px;height:58px;border-color:rgba(255,218,107,.5);font-size:12px}#focus{right:180px;bottom:36px;width:58px;height:58px;border-color:rgba(101,245,255,.5);font-size:11px}
@media(pointer:coarse),(max-width:900px){#touch{display:block}}
</style>
</head>
<body>
<div id="shell">
<canvas id="game" width="1200" height="900" aria-label="Galagacus V3 arcade game"></canvas>
<div id="touch"><div class="tb" id="left">◀</div><div class="tb" id="right">▶</div><div class="tb" id="up">▲</div><div class="tb" id="down">▼</div><div class="tb" id="focus">FOCUS</div><div class="tb" id="bomb">NOVA</div><div class="tb" id="fire">FIRE</div></div>
<div id="scan"></div><div id="vig"></div>
</div>
<script>
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,TAU=Math.PI*2;
const C={cyan:'#65f5ff',pink:'#ff52d5',gold:'#ffda6b',violet:'#9a78ff',green:'#62ff9d',red:'#ff5f70',blue:'#6281ff',white:'#fff',ink:'#071021',orange:'#ff9a55'};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),lerp=(a,b,t)=>a+(b-a)*t,rand=(a,b)=>a+Math.random()*(b-a),chance=p=>Math.random()<p,pick=a=>a[(Math.random()*a.length)|0];
const keys=Object.create(null);let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}
function tone(f=440,d=.06,type='square',v=.024,slide=0){if(!audioCtx||game.muted)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.setValueAtTime(f,audioCtx.currentTime);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(35,f+slide),audioCtx.currentTime+d);g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function noise(d=.12,v=.025){if(!audioCtx||game.muted)return;const n=Math.floor(audioCtx.sampleRate*d),b=audioCtx.createBuffer(1,n,audioCtx.sampleRate),data=b.getChannelData(0);for(let i=0;i<n;i++)data[i]=Math.random()*2-1;const s=audioCtx.createBufferSource(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();s.buffer=b;f.type='bandpass';f.frequency.value=700;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+d);s.connect(f).connect(g).connect(audioCtx.destination);s.start()}

const META={high:Number(localStorage.getItem('gv3_high')||0),credits:Number(localStorage.getItem('gv3_credits')||0),wins:Number(localStorage.getItem('gv3_wins')||0)};
function saveMeta(){localStorage.setItem('gv3_high',String(META.high));localStorage.setItem('gv3_credits',String(META.credits));localStorage.setItem('gv3_wins',String(META.wins))}
const SHIPS=[
{id:'falcon',name:'NOVA FALCON',tag:'Balanced hunter',color:C.cyan,speed:470,lives:3,rate:.17,damage:1,bombs:1,desc:'Fast, precise, adaptable. The classic ace platform.'},
{id:'bulwark',name:'IRON BULWARK',tag:'Heavy gunship',color:C.gold,speed:385,lives:4,rate:.21,damage:2,bombs:2,desc:'Slower, armored, and built to hit like a freight train.'},
{id:'phantom',name:'VOID PHANTOM',tag:'Glass cannon',color:C.pink,speed:540,lives:2,rate:.12,damage:1,bombs:1,desc:'Extreme fire rate and mobility. One mistake hurts.'},
{id:'aegis',name:'AEGIS PRIME',tag:'Victory prototype',color:C.violet,speed:455,lives:4,rate:.14,damage:2,bombs:2,cost:4000,desc:'Shielded prototype. Unlock with 4,000 persistent credits.'}
];
const STAGES=[
{name:'NEBULA FRONTIER',sub:'The first breach',c1:C.cyan,c2:C.violet},
{name:'MACHINE HIVE',sub:'Steel dreams awaken',c1:C.green,c2:C.gold},
{name:'SOLAR GRAVEYARD',sub:'Dead suns still burn',c1:C.orange,c2:C.red},
{name:'VOID CATHEDRAL',sub:'Where the stars go silent',c1:C.violet,c2:C.pink},
{name:'THRONE OF NULL',sub:'End the war',c1:C.red,c2:C.cyan}
];
const BOSS_NAMES={5:'VEXARA, QUEEN OF THE SWARM',10:'THE IRON CHOIR',15:'NULL EMPEROR'};
const game={state:'title',paused:false,muted:false,time:0,wave:1,score:0,combo:0,comboTimer:0,shake:0,flash:0,banner:0,bossWarning:0,waveTimer:0,between:false,selectedShip:0,upgradeChoices:[],stageIntro:0,musicClock:0,musicStep:0,campaignCredits:0,stars:[],dust:[],nebulas:[],pointer:{x:0,y:0,down:false}};
let player,enemies=[],pBullets=[],eBullets=[],particles=[],texts=[],powerups=[],beams=[],drones=[],blackHoles=[];
function resetSpace(){game.stars=[];game.dust=[];game.nebulas=[];for(let i=0;i<210;i++)game.stars.push({x:rand(0,W),y:rand(0,H),z:rand(.1,1),s:rand(.7,2.8),tw:rand(0,TAU)});for(let i=0;i<70;i++)game.dust.push({x:rand(0,W),y:rand(0,H),z:rand(.15,1),r:rand(1,7)});for(let i=0;i<6;i++)game.nebulas.push({x:rand(0,W),y:rand(0,H*.7),r:rand(150,310),a:rand(.04,.11)})}resetSpace();
function stageIndex(){return Math.min(4,Math.floor((game.wave-1)/3))}function stage(){return STAGES[stageIndex()]}
function addText(x,y,text,color=C.white,size=22,life=1){texts.push({x,y,text,color,size,life,max:life})}
function burst(x,y,color,n=14,sp=220){for(let i=0;i<n;i++){const a=rand(0,TAU),v=rand(sp*.2,sp);particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:rand(.25,.9),max:1,color,size:rand(1.5,5),drag:rand(.93,.985)})}}
function ring(x,y,color,r=8){particles.push({x,y,ring:true,r,life:.5,max:.5,color})}
function award(base,x,y){const m=1+Math.min(5,Math.floor(game.combo/8)),n=base*m;game.score+=n;game.combo++;game.comboTimer=2.5;if(game.score>META.high){META.high=game.score;saveMeta()}addText(x,y,'+'+n,m>1?C.gold:C.white,18,.75)}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}

class Bullet{constructor(x,y,vx,vy,w,h,color,damage=1,kind='normal',friendly=false){Object.assign(this,{x,y,vx,vy,w,h,color,damage,kind,friendly,dead:false,life:8,age:0,pierce:0})}update(dt){this.age+=dt;this.life-=dt;this.x+=this.vx*dt;this.y+=this.vy*dt;if(this.kind==='sine')this.x+=Math.sin(this.age*18)*90*dt;if(this.kind==='rocket')particles.push({x:this.x,y:this.y+7,vx:rand(-22,22),vy:rand(55,125),life:.23,max:.23,color:C.gold,size:rand(2,4),drag:.95});if(this.life<=0||this.x<-120||this.x>W+120||this.y<-140||this.y>H+140)this.dead=true}draw(){ctx.save();ctx.shadowBlur=this.kind==='rocket'?24:14;ctx.shadowColor=this.color;ctx.fillStyle=this.color;if(this.kind==='orb'){ctx.beginPath();ctx.arc(this.x,this.y,this.w*.78,0,TAU);ctx.fill()}else{ctx.fillRect(this.x-this.w/2,this.y-this.h/2,this.w,this.h)}ctx.restore()}}
class Beam{constructor(x,w,dps,color=C.cyan){this.x=x;this.w=w;this.dps=dps;this.color=color;this.life=.13;this.max=.13;this.dead=false}update(dt){this.life-=dt;this.x=player.x;if(this.life<=0)this.dead=true}draw(){const a=clamp(this.life/this.max,0,1);ctx.save();ctx.globalAlpha=a;const g=ctx.createLinearGradient(this.x,0,this.x,player.y);g.addColorStop(0,'rgba(255,255,255,.95)');g.addColorStop(.2,rgba(this.color,.85));g.addColorStop(1,rgba(this.color,0));ctx.fillStyle=g;ctx.shadowBlur=30;ctx.shadowColor=this.color;ctx.fillRect(this.x-this.w/2,0,this.w,player.y-22);ctx.restore()}}
class BlackHole{constructor(x,y,power=1){this.x=x;this.y=y;this.power=power;this.life=2.4+power*.5;this.max=this.life;this.r=20;this.dead=false}update(dt){this.life-=dt;this.r=lerp(this.r,70+this.power*12,dt*2.5);for(const b of eBullets){const dx=this.x-b.x,dy=this.y-b.y,d=Math.hypot(dx,dy)||1;if(d<320){b.vx+=dx/d*1100*dt;b.vy+=dy/d*1100*dt;if(d<this.r)b.dead=true}}for(const e of enemies){if(e.dead)continue;const dx=this.x-e.x,dy=this.y-e.y,d=Math.hypot(dx,dy)||1;if(d<300){e.x+=dx/d*130*dt;e.y+=dy/d*130*dt;if(d<this.r+20)e.hit((4+this.power*2)*dt)}}if(this.life<=0)this.dead=true}draw(){ctx.save();const a=clamp(this.life/this.max,0,1);ctx.globalCompositeOperation='lighter';for(let i=3;i>0;i--){ctx.strokeStyle=rgba(i===1?C.white:i===2?C.violet:C.cyan,a*(.25+i*.12));ctx.lineWidth=3+i*2;ctx.beginPath();ctx.arc(this.x,this.y,this.r+i*12+Math.sin(game.time*5+i)*4,game.time*(i%2?1:-1),game.time*(i%2?1:-1)+Math.PI*1.5);ctx.stroke()}ctx.fillStyle='#000';ctx.shadowBlur=30;ctx.shadowColor=C.violet;ctx.beginPath();ctx.arc(this.x,this.y,this.r*.65,0,TAU);ctx.fill();ctx.restore()}}
class Drone{constructor(side=1,rescued=false){this.side=side;this.rescued=rescued;this.x=W/2+side*50;this.y=H-100;this.cool=.2;this.phase=rand(0,TAU)}update(dt){this.phase+=dt*3.4;const tx=player.x+this.side*(42+Math.sin(this.phase)*10),ty=player.y+Math.cos(this.phase*1.4)*10;this.x=lerp(this.x,tx,dt*7);this.y=lerp(this.y,ty,dt*7);this.cool-=dt;if(this.cool<=0&&!player.dead){this.cool=Math.max(.07,player.fireRate*1.12);pBullets.push(new Bullet(this.x,this.y-14,0,-720,5,13,this.rescued?C.gold:C.violet,1,'normal',true));tone(520,.035,'square',.009,30)}}draw(){ctx.save();ctx.translate(this.x,this.y);ctx.shadowBlur=18;ctx.shadowColor=this.rescued?C.gold:C.violet;ctx.strokeStyle=this.rescued?C.gold:C.violet;ctx.fillStyle='rgba(8,12,35,.94)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(0,-11);ctx.lineTo(11,1);ctx.lineTo(0,10);ctx.lineTo(-11,1);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=C.white;ctx.beginPath();ctx.arc(0,0,3,0,TAU);ctx.fill();ctx.restore()}}

class Player{constructor(ship){this.ship=ship;this.x=W/2;this.y=H-88;this.speed=ship.speed;this.lives=ship.lives;this.fireRate=ship.rate;this.baseDamage=ship.damage;this.bombs=ship.bombs;this.shields=ship.id==='aegis'?2:0;this.dead=false;this.respawn=0;this.inv=2;this.fireCd=0;this.engine=0;this.focus=false;this.spread=0;this.laser=0;this.rockets=0;this.orbs=0;this.chain=0;this.singularity=0;this.overdrive=0;this.droneCount=0;this.captureMeter=0;this.captured=false;this.rescueWings=0}update(dt){if(this.dead){this.respawn-=dt;if(this.respawn<=0&&this.lives>0){this.dead=false;this.inv=2;this.x=W/2;this.y=H-88}return}this.focus=!!(keys.ShiftLeft||keys.ShiftRight);const sp=this.speed*(this.focus?.54:1)*(1+this.overdrive*.025);let dx=0,dy=0;if(keys.ArrowLeft||keys.KeyA)dx--;if(keys.ArrowRight||keys.KeyD)dx++;if(keys.ArrowUp||keys.KeyW)dy--;if(keys.ArrowDown||keys.KeyS)dy++;const l=Math.hypot(dx,dy)||1;this.x=clamp(this.x+dx/l*sp*dt,28,W-28);this.y=clamp(this.y+dy/l*sp*dt,H*.52,H-40);this.engine+=dt*(16+this.overdrive);this.fireCd-=dt;this.inv=Math.max(0,this.inv-dt);if((keys.Space||keys.KeyZ)&&this.fireCd<=0)this.fire();if((keys.KeyX||keys.KeyB||keys.ControlLeft)&&this.bombs>0&&!this.bombHeld){this.bombHeld=true;this.useBomb()}if(!(keys.KeyX||keys.KeyB||keys.ControlLeft))this.bombHeld=false}fire(){this.fireCd=Math.max(.055,this.fireRate-this.overdrive*.008);const y=this.y-24,d=this.baseDamage+Math.floor(this.overdrive/4);const shots=this.spread===0?[0]:this.spread===1?[-.10,.10]:this.spread===2?[-.24,-.1,0,.1,.24]:[-.38,-.19,0,.19,.38];for(const a of shots){const sp=800;pBullets.push(new Bullet(this.x,y,Math.sin(a)*sp,-Math.cos(a)*sp,5,15,a===0?C.white:this.ship.color,d,'normal',true))}if(this.laser)beams.push(new Beam(this.x,8+this.laser*5,18+this.laser*12,C.cyan));if(this.rockets){pBullets.push(new Bullet(this.x-15,this.y-10,-25,-540,8,20,C.gold,2+this.rockets,'rocket',true));if(this.rockets>1)pBullets.push(new Bullet(this.x+15,this.y-10,25,-540,8,20,C.gold,2+this.rockets,'rocket',true))}if(this.orbs){pBullets.push(new Bullet(this.x-18,this.y-12,-50,-470,10,10,C.violet,2+this.orbs,'orb',true));if(this.orbs>1)pBullets.push(new Bullet(this.x+18,this.y-12,50,-470,10,10,C.violet,2+this.orbs,'orb',true))}tone(this.laser?680:560,.045,'square',.018,50)}useBomb(){this.bombs--;game.shake=26;game.flash=.35;for(const b of eBullets)b.dead=true;if(this.singularity){blackHoles.push(new BlackHole(this.x,this.y-180,this.singularity));addText(this.x,this.y-40,'SINGULARITY',C.violet,28,.9)}else{for(const e of enemies)if(!e.dead)e.hit(Math.hypot(e.x-this.x,e.y-this.y)<380?6:2);ring(this.x,this.y,C.gold,55);burst(this.x,this.y,C.gold,55,430);addText(this.x,this.y-35,'NOVA BOMB',C.gold,28,.9)}tone(130,.35,'sawtooth',.075,360);noise(.22,.06)}hit(){if(this.dead||this.inv>0)return;if(this.shields>0){this.shields--;this.inv=.85;game.shake=8;ring(this.x,this.y,C.cyan,30);tone(170,.17,'sawtooth',.05,-80);return}this.lives--;this.dead=true;this.respawn=1.5;game.shake=20;game.flash=.28;burst(this.x,this.y,C.cyan,28,330);burst(this.x,this.y,C.pink,24,280);noise(.3,.07);tone(90,.4,'sawtooth',.08,-40);if(this.lives<=0)setTimeout(()=>{if(game.state==='playing')endRun(false)},700)}capture(captor){if(this.dead||this.inv>0)return;this.lives--;this.dead=true;this.respawn=1.8;this.captureMeter=0;captor.hasCaptured=true;game.shake=16;game.flash=.18;addText(this.x,this.y-40,'SHIP CAPTURED!',C.red,30,1.2);tone(240,.5,'sine',.06,-140);if(this.lives<=0)setTimeout(()=>{if(game.state==='playing')endRun(false)},900)}draw(){if(this.dead)return;if(this.inv>0&&Math.floor(this.inv*14)%2===0)return;drawShip(this.x,this.y,this.ship.color,1,this.engine,this.shields>0)}}
function drawShip(x,y,color,scale=1,engine=0,shield=false){ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);if(shield){ctx.strokeStyle=rgba(C.cyan,.72);ctx.lineWidth=2;ctx.shadowBlur=16;ctx.shadowColor=C.cyan;ctx.beginPath();ctx.arc(0,0,32+Math.sin(game.time*7)*2,0,TAU);ctx.stroke()}for(const s of[-1,1]){ctx.fillStyle=s<0?C.cyan:C.pink;ctx.shadowBlur=20;ctx.shadowColor=ctx.fillStyle;ctx.beginPath();ctx.moveTo(s*9,15);ctx.lineTo(s*4,24+Math.sin(engine+s)*4);ctx.lineTo(s,15);ctx.closePath();ctx.fill()}const g=ctx.createLinearGradient(0,-28,0,22);g.addColorStop(0,'#fff');g.addColorStop(.23,color);g.addColorStop(.72,C.blue);g.addColorStop(1,'#17265e');ctx.shadowBlur=22;ctx.shadowColor=color;ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,-29);ctx.lineTo(14,-8);ctx.lineTo(25,10);ctx.lineTo(9,6);ctx.lineTo(0,23);ctx.lineTo(-9,6);ctx.lineTo(-25,10);ctx.lineTo(-14,-8);ctx.closePath();ctx.fill();ctx.fillStyle=C.pink;ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(7,2);ctx.lineTo(0,10);ctx.lineTo(-7,2);ctx.closePath();ctx.fill();ctx.restore()}

const ED={drone:{hp:1,score:120,color:C.cyan,size:22,fire:.16},wasp:{hp:2,score:220,color:C.pink,size:26,fire:.22},beetle:{hp:4,score:360,color:C.gold,size:29,fire:.28},guardian:{hp:8,score:720,color:C.violet,size:36,fire:.4},captor:{hp:7,score:900,color:C.green,size:38,fire:.25}};
class Enemy{constructor(type,sx,sy,delay=0){this.type=type;this.def=ED[type];this.maxHp=this.def.hp+Math.floor(game.wave/6);this.hp=this.maxHp;this.slotX=sx;this.slotY=sy;this.x=W/2;this.y=-100;this.r=this.def.size;this.t=-delay;this.phase='enter';this.dead=false;this.seed=rand(0,TAU);this.fireCd=rand(.6,2.2);this.diveCd=rand(2.5,6);this.diveT=0;this.tractorCd=rand(2,5);this.tractor=0;this.hasCaptured=false}slot(){return{x:W/2+this.slotX+Math.sin(game.time*.75+this.slotY*.01)*20,y:120+this.slotY}}update(dt){this.t+=dt;if(this.t<0)return;if(this.type==='captor'&&this.phase==='formation'){this.tractorCd-=dt;if(this.tractorCd<=0){this.phase='tractor';this.tractor=2.4;this.tractorCd=rand(5,8)}}if(this.phase==='enter'){const p=this.slot(),u=clamp(this.t/1.4,0,1),e=1-Math.pow(1-u,3);this.x=lerp(W/2+Math.sin(this.seed)*300,p.x,e);this.y=lerp(-90,p.y,e)+Math.sin(u*TAU+this.seed)*42*(1-u);if(u>=1){this.phase='formation';this.t=0}}else if(this.phase==='formation'){const p=this.slot();this.x=lerp(this.x,p.x,dt*4.2);this.y=lerp(this.y,p.y,dt*4.2);this.fireCd-=dt;this.diveCd-=dt;if(this.fireCd<=0&&chance(this.def.fire*clamp(game.wave/5,.55,1.7))){this.fireCd=rand(1,3)/Math.min(1.7,1+game.wave*.03);this.shoot()}if(this.type!=='captor'&&this.diveCd<=0&&enemies.filter(e=>e.phase==='dive').length<Math.min(7,1+Math.floor(game.wave/2))){this.phase='dive';this.diveT=0;this.startX=this.x;this.startY=this.y;this.diveCd=rand(4,8)}}else if(this.phase==='dive'){this.diveT+=dt;const tx=!player.dead?player.x:this.startX;this.x=this.startX+Math.sin(this.diveT*2.3+this.seed)*210+Math.sin(this.diveT*.75)*(tx-this.startX)*.75;this.y=this.startY+this.diveT*(235+game.wave*6);this.fireCd-=dt;if(chance(dt*.75)&&this.fireCd<=0){this.shoot();this.fireCd=.55}if(this.y>H+70){this.phase='return';this.t=0;this.y=-60}}else if(this.phase==='return'){const p=this.slot(),u=clamp(this.t/1.1,0,1);this.x=lerp(this.x,p.x,u);this.y=lerp(-60,p.y,u);if(u>=1){this.phase='formation';this.t=0}}else if(this.phase==='trac class Boss{constructor(wave){this.type='boss';this.wave=wave;this.name=BOSS_NAMES[wave];this.x=W/2;this.y=-170;this.w=210;this.h=120;this.t=0;this.dead=false;this.maxHp=wave===5?150:wave===10?260:430;this.hp=this.maxHp;this.fireCd=.7;this.mode=0}update(dt){this.t+=dt;this.y=lerp(this.y,125,dt*1.1);this.x=W/2+Math.sin(this.t*.58)*260;this.fireCd-=dt;if(this.fireCd<=0&&this.y>70){const rage=1+(1-this.hp/this.maxHp)*1.0;this.mode=(this.mode+1)%6;if(this.mode===0){for(let i=0;i<20;i++){const a=i*TAU/20+this.t*.2;eBullets.push(new Bullet(this.x,this.y+25,Math.cos(a)*200*rage,Math.sin(a)*200*rage,8,8,C.pink,1,'orb'))}this.fireCd=.9/rage}else if(this.mode===1){const a=Math.atan2(player.y-this.y,player.x-this.x);for(let i=-5;i<=5;i++)eBullets.push(new Bullet(this.x,this.y+20,Math.cos(a+i*.075)*270*rage,Math.sin(a+i*.075)*270*rage,7,14,C.gold));this.fireCd=.72/rage}else if(this.mode===2){for(let k=-1;k<=1;k++)for(let i=0;i<7;i++){const a=Math.PI/2+(i-3)*.16;eBullets.push(new Bullet(this.x+k*55,this.y+30,Math.cos(a)*225*rage,Math.sin(a)*225*rage,8,8,C.violet,1,'orb'))}this.fireCd=.68/rage}else if(this.mode===3){for(let i=0;i<10;i++){const s=-.6+i*(1.2/9);eBullets.push(new Bullet(this.x,this.y+28,s*220,270+Math.abs(s)*100,8,15,C.red))}this.fireCd=.58/rage}else if(this.mode===4){for(let i=0;i<14;i++){const a=i*TAU/14-this.t*.35;eBullets.push(new Bullet(this.x,this.y+20,Math.cos(a)*150*rage,Math.sin(a)*150*rage,7,7,C.cyan,1,'sine'))}this.fireCd=.72/rage}else{const a=Math.atan2(player.y-this.y,player.x-this.x);for(let i=0;i<5;i++)setTimeout(()=>{if(game.state==='playing'&&!this.dead)eBullets.push(new Bullet(this.x,this.y+20,Math.cos(a)*340,Math.sin(a)*340,9,19,C.red))},i*80);this.fireCd=.95/rage}tone(105,.11,'sawtooth',.03,-16)}}hit(d){this.hp-=d;burst(rand(this.x-this.w/2,this.x+this.w/2),rand(this.y-this.h/2,this.y+this.h/2),pick([C.cyan,C.pink,C.gold]),3,90);if(this.hp<=0)this.kill()}kill(){if(this.dead)return;this.dead=true;game.score+=this.wave*1000;if(game.score>META.high)META.high=game.score;game.campaignCredits+=this.wave*40;game.combo+=12;game.shake=34;game.flash=.5;for(let i=0;i<14;i++)setTimeout(()=>{burst(this.x+rand(-105,105),this.y+rand(-60,60),pick([C.cyan,C.pink,C.gold,C.violet]),28,340);noise(.15,.035)},i*85);powerups.push(new Powerup(this.x-35,this.y,'life'));powerups.push(new Powerup(this.x+35,this.y,'bomb'));addText(this.x,this.y,'BOSS DESTROYED',C.gold,34,1.4);tone(260,.25,'sine',.07,420)}draw(){ctx.save();ctx.translate(this.x,this.y);ctx.shadowBlur=34;ctx.shadowColor=this.wave===15?C.red:C.pink;ctx.fillStyle='rgba(8,8,28,.98)';ctx.strokeStyle=this.wave===15?C.red:C.pink;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,-64);ctx.lineTo(75,-42);ctx.lineTo(110,0);ctx.lineTo(78,44);ctx.lineTo(30,30);ctx.lineTo(0,54);ctx.lineTo(-30,30);ctx.lineTo(-78,44);ctx.lineTo(-110,0);ctx.lineTo(-75,-42);ctx.closePath();ctx.fill();ctx.stroke();ctx.strokeStyle=C.cyan;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-82,-6);ctx.lineTo(-24,-16);ctx.lineTo(0,14);ctx.lineTo(24,-16);ctx.lineTo(82,-6);ctx.stroke();ctx.fillStyle=this.wave===15?C.red:C.gold;ctx.beginPath();ctx.arc(0,-5,18+Math.sin(game.time*8)*3,0,TAU);ctx.fill();ctx.restore();ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(W/2-285,54,570,13);const g=ctx.createLinearGradient(W/2-285,0,W/2+285,0);g.addColorStop(0,C.cyan);g.addColorStop(.5,C.pink);g.addColorStop(1,C.gold);ctx.fillStyle=g;ctx.fillRect(W/2-285,54,570*(this.hp/this.maxHp),13);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.strokeRect(W/2-285,54,570,13);ctx.fillStyle=C.white;ctx.font='800 15px monospace';ctx.textAlign='center';ctx.fillText(this.name,W/2,44)}}

class Powerup{constructor(x,y,kind){this.x=x;this.y=y;this.kind=kind;this.vy=100;this.t=0;this.dead=false}color(){return this.kind==='shield'?C.cyan:this.kind==='life'?C.gold:this.kind==='bomb'?C.red:this.kind==='rescue'?C.green:C.violet}update(dt){this.t+=dt;this.y+=this.vy*dt;if(this.y>H+30)this.dead=true;if(!player.dead&&Math.abs(this.x-player.x)<30&&Math.abs(this.y-player.y)<30)this.collect()}collect(){this.dead=true;if(this.kind==='shield'){player.shields=Math.min(4,player.shields+1);addText(this.x,this.y,'SHIELD +1',C.cyan)}if(this.kind==='life'){player.lives++;addText(this.x,this.y,'EXTRA LIFE',C.gold)}if(this.kind==='bomb'){player.bombs=Math.min(6,player.bombs+1);addText(this.x,this.y,'NOVA +1',C.red)}if(this.kind==='overdrive'){player.overdrive=Math.min(10,player.overdrive+1);addText(this.x,this.y,'OVERDRIVE',C.violet)}if(this.kind==='rescue'){player.rescueWings++;const side=player.rescueWings%2?-1:1;drones.push(new Drone(side,true));addText(this.x,this.y,'CAPTURED SHIP RESCUED!',C.green,25,1.2);game.score+=1500}burst(this.x,this.y,this.color(),22,210);tone(610,.18,'sine',.05,360)}draw(){const c=this.color();ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.t*1.8);ctx.shadowBlur=20;ctx.shadowColor=c;ctx.strokeStyle=c;ctx.fillStyle='rgba(7,12,30,.95)';ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<6;i++){const a=i*TAU/6-Math.PI/2,x=Math.cos(a)*18,y=Math.sin(a)*18;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.closePath();ctx.fill();ctx.stroke();ctx.rotate(-this.t*1.8);ctx.fillStyle=C.white;ctx.font='900 14px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.kind==='rescue'?'R':this.kind==='shield'?'S':this.kind==='life'?'1UP':this.kind==='bomb'?'N':'+',0,1);ctx.restore()}}

const UPGRADES=[
{id:'spread',title:'PRISM VOLLEY',desc:'Adds more projectiles and broadens your firing arc.',color:C.pink,apply:()=>player.spread=Math.min(3,player.spread+1)},
{id:'laser',title:'SOLAR LANCE',desc:'Adds a continuous piercing beam to every volley.',color:C.cyan,apply:()=>player.laser=Math.min(3,player.laser+1)},
{id:'rockets',title:'HUNTER ROCKETS',desc:'Launches heavy micro-missiles with splash damage.',color:C.gold,apply:()=>player.rockets=Math.min(3,player.rockets+1)},
{id:'orbs',title:'VOID PLASMA',desc:'Adds slow, devastating plasma spheres.',color:C.violet,apply:()=>player.orbs=Math.min(3,player.orbs+1)},
{id:'chain',title:'CHAIN LIGHTNING',desc:'Hits nearby enemies after your shots connect.',color:C.cyan,apply:()=>player.chain=Math.min(3,player.chain+1)},
{id:'singularity',title:'BLACK HOLE NOVA',desc:'Transforms bombs into bullet-eating singularities.',color:C.violet,apply:()=>player.singularity=Math.min(3,player.singularity+1)},
{id:'drone',title:'DRONE WING',desc:'Deploys an autonomous weapon drone.',color:C.green,apply:()=>{player.droneCount++;drones.push(new Drone(player.droneCount%2?-1:1,false))}},
{id:'overdrive',title:'OVERDRIVE CORE',desc:'Increases movement and rate of fire.',color:C.green,apply:()=>player.overdrive=Math.min(10,player.overdrive+2)},
{id:'shield',title:'AEGIS BATTERY',desc:'Adds a rechargeable shield layer.',color:C.cyan,apply:()=>player.shields=Math.min(4,player.shields+1)},
{id:'bomb',title:'NOVA RESERVE',desc:'Adds one emergency nova weapon.',color:C.red,apply:()=>player.bombs=Math.min(6,player.bombs+1)},
{id:'life',title:'CLONE POD',desc:'Restores one life to the squadron.',color:C.gold,apply:()=>player.lives++}
];
function upgradeChoices(){const bag=[...UPGRADES],out=[];while(out.length<3){out.push(bag.splice((Math.random()*bag.length)|0,1)[0])}return out}
function openUpgrade(){game.state='upgrade';game.upgradeChoices=upgradeChoices();game.campaignCredits+=75+game.wave*12;tone(440,.18,'sine',.045,240)}
function chooseUpgrade(i){const u=game.upgradeChoices[i];if(!u)return;u.apply();addText(W/2,H*.32,u.title,u.color,30,1);tone(540,.18,'sine',.055,280);game.upgradeChoices=[];game.wave++;if(game.wave>15){endRun(true);return}game.state='playing';spawnWave()}

function spawnWave(){enemies=[];pBullets=[];eBullets=[];beams=[];powerups=[];blackHoles=[];game.between=false;game.banner=2.1;game.stageIntro=(game.wave===1||game.wave===4||game.wave===7||game.wave===10||game.wave===13)?2.8:0;game.bossWarning=0;if(game.wave%5===0){game.bossWarning=2.5;setTimeout(()=>{if(game.state==='playing'&&enemies.length===0)enemies.push(new Boss(game.wave))},2100);return}const rows=Math.min(5,2+Math.floor(game.wave/2)),cols=Math.min(10,5+game.wave),sx=74,sy=60;let idx=0;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(r===rows-1&&(c===0||c===cols-1)&&game.wave<3)continue;let type='drone';if(r===0&&game.wave>=2)type='wasp';if(r===1&&game.wave>=4)type='beetle';if((r===0||r===1)&&game.wave>=7&&c%3===0)type='guardian';if(game.wave>=3&&r===0&&c===Math.floor(cols/2))type='captor';enemies.push(new Enemy(type,(c-(cols-1)/2)*sx,r*sy,idx*.045));idx++}}
function startCampaign(){const ship=SHIPS[game.selectedShip];if(ship.cost&&META.credits<ship.cost){tone(100,.16,'square',.04,-30);return}game.state='playing';game.paused=false;game.time=0;game.wave=1;game.score=0;game.combo=0;game.comboTimer=0;game.shake=0;game.flash=0;game.campaignCredits=0;enemies=[];pBullets=[];eBullets=[];particles=[];texts=[];powerups=[];beams=[];drones=[];blackHoles=[];player=new Player(ship);spawnWave();tone(220,.18,'square',.05,440)}
function endRun(win){const earned=Math.floor(game.score/200)+game.campaignCredits;META.credits+=earned;if(game.score>META.high)META.high=game.score;if(win)META.wins++;saveMeta();game.earned=earned;game.state=win?'victory':'gameover'}

function chainLightning(source,target,level){let current=target,hit=[target];for(let n=0;n<level;n++){let best=null,bd=190;for(const e of enemies){if(e.dead||hit.includes(e))continue;const d=Math.hypot(e.x-current.x,e.y-current.y);if(d<bd){bd=d;best=e}}if(!best)break;particles.push({lightning:true,x1:current.x,y1:current.y,x2:best.x,y2:best.y,life:.16,max:.16,color:C.cyan});best.hit(1+level*.5);hit.push(best);current=best}}
function collisions(dt){for(const b of pBullets){if(b.dead)continue;for(const e of enemies){if(e.dead)continue;const ew=e.type==='boss'?e.w:e.r*1.7,eh=e.type==='boss'?e.h:e.r*1.7;if(Math.abs(b.x-e.x)<ew/2+b.w/2&&Math.abs(b.y-e.y)<eh/2+b.h/2){e.hit(b.damage);if(player.chain&&chance(.35+.15*player.chain))chainLightning(b,e,player.chain);if(b.kind==='rocket'){burst(b.x,b.y,C.gold,11,190);ring(b.x,b.y,C.gold,18);for(const q of enemies)if(!q.dead&&Math.hypot(q.x-b.x,q.y-b.y)<70)q.hit(1+player.rockets*.6)}if(b.kind==='orb'){b.damage--;if(b.damage<=0)b.dead=true}else b.dead=true;break}}}for(const beam of beams)for(const e of enemies){if(e.dead)continue;const ew=e.type==='boss'?e.w/2:e.r*.9;if(Math.abs(e.x-beam.x)<beam.w/2+ew&&e.y<player.y&&e.y>0)e.hit(beam.dps*dt)}if(!player.dead){for(const b of eBullets)if(!b.dead&&Math.abs(b.x-player.x)<18+b.w/2&&Math.abs(b.y-player.y)<17+b.h/2){b.dead=true;player.hit()}for(const e of enemies){if(e.dead)continue;const rr=e.type==='boss'?52:e.r*.8;if((e.x-player.x)**2+(e.y-player.y)**2<(rr+17)**2){if(e.type!=='boss')e.kill();player.hit()}}}}
function music(dt){if(game.muted||game.state!=='playing')return;game.musicClock-=dt;if(game.musicClock<=0){game.musicClock=.24;const scale=stageIndex()===0?[110,165,220,165]:stageIndex()===1?[98,147,196,247]:stageIndex()===2?[82,123,164,246]:stageIndex()===3?[73,110,146,220]:[65,98,131,196];const f=scale[game.musicStep%scale.length];tone(f,.16,'triangle',.006,game.musicStep%4===3?f*.5:0);if(game.musicStep%4===0)tone(f/2,.08,'square',.004);game.musicStep++}}
function update(dt){if(game.state!=='playing'||game.paused)return;game.time+=dt;music(dt);game.comboTimer-=dt;if(game.comboTimer<=0)game.combo=0;game.flash=Math.max(0,game.flash-dt);game.shake=Math.max(0,game.shake-dt*24);game.banner=Math.max(0,game.banner-dt);game.bossWarning=Math.max(0,game.bossWarning-dt);game.stageIntro=Math.max(0,game.stageIntro-dt);for(const s of game.stars){s.y+=(18+s.z*50)*dt;s.tw+=dt*(1+s.z*2);if(s.y>H){s.y=0;s.x=rand(0,W)}}for(const d of game.dust){d.y+=d.z*26*dt;if(d.y>H+20){d.y=-20;d.x=rand(0,W)}}player.update(dt);for(const d of drones)d.update(dt);for(const b of pBullets)b.update(dt);for(const b of eBullets)b.update(dt);for(const e of enemies)e.update(dt);for(const p of powerups)p.update(dt);for(const b of beams)b.update(dt);for(const h of blackHoles)h.update(dt);for(const p of particles){p.life-=dt;if(p.ring)p.r+=330*dt;else if(!p.lightning){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=Math.pow(p.drag,dt*60);p.vy*=Math.pow(p.drag,dt*60)}}for(const t of texts){t.life-=dt;t.y-=36*dt}collisions(dt);pBullets=pBullets.filter(x=>!x.dead);eBullets=eBullets.filter(x=>!x.dead);enemies=enemies.filter(x=>!x.dead);powerups=powerups.filter(x=>!x.dead);beams=beams.filter(x=>!x.dead);blackHoles=blackHoles.filter(x=>!x.dead);particles=particles.filter(x=>x.life>0);texts=texts.filter(x=>x.life>0);if(!game.between&&enemies.length===0&&game.bossWarning<=0){game.between=true;game.waveTimer=1.8;addText(W/2,H*.42,game.wave===15?'THE EMPEROR FALLS':'SECTOR CLEARED',C.gold,38,1.2);tone(420,.22,'sine',.055,250)}if(game.between){game.waveTimer-=dt;if(game.waveTimer<=0){game.between=false;if(game.wave===15)endRun(true);else openUpgrade()}}}

function drawBackground(){const st=stage(),si=stageIndex();ctx.fillStyle='#02030a';ctx.fillRect(0,0,W,H);const bg=ctx.createRadialGradient(W/2,H*.18,0,W/2,H*.18,H*.95);bg.addColorStop(0,rgba(st.c1,.24));bg.addColorStop(.3,rgba(st.c2,.11));bg.addColorStop(.72,'#030510');bg.addColorStop(1,'#010207');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);for(let i=0;i<game.nebulas.length;i++){const n=game.nebulas[i],g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,rgba(i%2?st.c1:st.c2,n.a));g.addColorStop(.6,rgba(i%2?st.c1:st.c2,n.a*.35));g.addColorStop(1,rgba(st.c1,0));ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,TAU);ctx.fill()}if(si===1){ctx.save();ctx.globalAlpha=.12;ctx.strokeStyle=C.green;ctx.lineWidth=1;for(let x=-H;x<W+H;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x-H,H);ctx.stroke()}for(let y=100;y<H;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}ctx.restore()}if(si===2){const x=W*.82,y=H*.18,g=ctx.createRadialGradient(x,y,0,x,y,190);g.addColorStop(0,'rgba(255,255,210,.85)');g.addColorStop(.18,rgba(C.gold,.55));g.addColorStop(.5,rgba(C.red,.14));g.addColorStop(1,rgba(C.red,0));ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,190,0,TAU);ctx.fill()}if(si===3){ctx.save();ctx.globalAlpha=.13;ctx.strokeStyle=C.violet;ctx.lineWidth=18;for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(W/2,H*.3,160+i*95,Math.PI,TAU);ctx.stroke()}ctx.restore()}if(si===4){ctx.save();ctx.globalAlpha=.16;ctx.strokeStyle=C.red;ctx.lineWidth=3;for(let i=0;i<12;i++){const a=i*TAU/12+game.time*.03;ctx.beginPath();ctx.moveTo(W/2,H*.28);ctx.lineTo(W/2+Math.cos(a)*700,H*.28+Math.sin(a)*700);ctx.stroke()}ctx.restore()}for(const d of game.dust){ctx.fillStyle='rgba(160,190,255,.055)';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,TAU);ctx.fill()}for(const s of game.stars){const a=.2+s.z*.72+Math.sin(s.tw)*.12;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fillRect(s.x,s.y,s.s,s.s)}}
function drawHUD(){ctx.save();ctx.textBaseline='top';ctx.textAlign='left';ctx.font='800 14px monospace';ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillText('SCORE',22,17);ctx.fillStyle=C.white;ctx.font='900 27px monospace';ctx.fillText(String(game.score).padStart(8,'0'),22,36);ctx.textAlign='center';ctx.font='800 13px monospace';ctx.fillStyle='rgba(255,255,255,.62)';ctx.fillText(stage().name,W/2,17);ctx.fillStyle=C.gold;ctx.font='900 21px monospace';ctx.fillText('WAVE '+String(game.wave).padStart(2,'0'),W/2,36);ctx.textAlign='right';ctx.font='800 13px monospace';ctx.fillStyle='rgba(255,255,255,.62)';ctx.fillText('HIGH',W-24,17);ctx.fillStyle=C.gold;ctx.font='900 21px monospace';ctx.fillText(String(META.high).padStart(8,'0'),W-24,36);ctx.textAlign='left';ctx.font='900 15px monospace';ctx.fillStyle=C.cyan;ctx.fillText('LIVES '+Math.max(0,player.lives),22,H-31);ctx.fillStyle=C.gold;ctx.fillText('NOVA '+player.bombs,132,H-31);ctx.fillStyle=C.green;ctx.fillText('OD '+player.overdrive,232,H-31);ctx.fillStyle=C.violet;ctx.fillText('WINGS '+(player.droneCount+player.rescueWings),304,H-31);if(player.shields){ctx.fillStyle=C.cyan;ctx.fillText('SHIELD '+player.shields,430,H-31)}if(game.combo>2){ctx.textAlign='right';ctx.fillStyle=C.gold;ctx.font='900 21px monospace';ctx.fillText(`COMBO ${game.combo}  x${1+Math.min(5,Math.floor(game.combo/8))}`,W-22,H-34)}ctx.restore()}
function drawEffects(){for(const p of particles){const a=clamp(p.life/(p.max||1),0,1);ctx.save();ctx.globalAlpha=a;ctx.shadowBlur=12;ctx.shadowColor=p.color;if(p.ring){ctx.strokeStyle=p.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.stroke()}else if(p.lightning){ctx.strokeStyle=p.color;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(p.x1,p.y1);for(let i=1;i<7;i++){const t=i/7;ctx.lineTo(lerp(p.x1,p.x2,t)+rand(-12,12),lerp(p.y1,p.y2,t)+rand(-12,12))}ctx.lineTo(p.x2,p.y2);ctx.stroke()}else{ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)}ctx.restore()}for(const t of texts){ctx.save();ctx.globalAlpha=clamp(t.life/t.max,0,1);ctx.textAlign='center';ctx.font=`900 ${t.size}px monospace`;ctx.fillStyle=t.color;ctx.shadowBlur=16;ctx.shadowColor=t.color;ctx.fillText(t.text,t.x,t.y);ctx.restore()}}
function drawGameplay(){drawBackground();const sx=game.shake?rand(-game.shake,game.shake):0,sy=game.shake?rand(-game.shake,game.shake):0;ctx.save();ctx.translate(sx,sy);for(const h of blackHoles)h.draw();for(const b of beams)b.draw();for(const p of powerups)p.draw();for(const e of enemies)e.draw();for(const b of pBullets)b.draw();for(const b of eBullets)b.draw();for(const d of drones)d.draw();player.draw();drawEffects();ctx.restore();drawHUD();if(game.banner>0){ctx.save();ctx.globalAlpha=Math.min(1,game.banner*1.4);ctx.textAlign='center';ctx.fillStyle=C.white;ctx.shadowBlur=20;ctx.shadowColor=stage().c1;ctx.font='900 50px monospace';ctx.fillText('WAVE '+game.wave,W/2,H*.47);ctx.restore()}if(game.stageIntro>0){ctx.save();ctx.globalAlpha=Math.min(1,game.stageIntro*.75);ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,H*.28,W,180);ctx.textAlign='center';ctx.fillStyle=stage().c1;ctx.shadowBlur=24;ctx.shadowColor=stage().c1;ctx.font='900 48px system-ui';ctx.fillText(stage().name,W/2,H*.36);ctx.fillStyle=C.white;ctx.font='700 18px monospace';ctx.fillText(stage().sub,W/2,H*.41);ctx.restore()}if(game.bossWarning>0){ctx.save();ctx.globalAlpha=.55+.45*Math.sin(game.time*16);ctx.fillStyle='rgba(255,45,65,.11)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle=C.red;ctx.shadowBlur=25;ctx.shadowColor=C.red;ctx.font='900 50px monospace';ctx.fillText(BOSS_NAMES[game.wave],W/2,H*.46);ctx.font='800 20px monospace';ctx.fillText('OVERLORD SIGNAL DETECTED',W/2,H*.51);ctx.restore()}if(player.captureMeter>0){ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(W/2-140,H-78,280,10);ctx.fillStyle=C.green;ctx.fillRect(W/2-140,H-78,280*clamp(player.captureMeter/1.05,0,1),10);ctx.fillStyle=C.white;ctx.font='800 14px monospace';ctx.textAlign='center';ctx.fillText('TRACTOR LOCK',W/2,H-86)}if(game.paused){ctx.fillStyle='rgba(0,0,0,.68)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle=C.white;ctx.font='900 58px monospace';ctx.fillText('PAUSED',W/2,H/2);ctx.fillStyle=C.cyan;ctx.font='700 18px monospace';ctx.fillText('P TO RESUME',W/2,H/2+45)}if(game.flash>0){ctx.fillStyle=`rgba(255,255,255,${game.flash})`;ctx.fillRect(0,0,W,H)}}
function roundRect(x,y,w,h,r,fill=true,stroke=true){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill)ctx.fill();if(stroke)ctx.stroke()}
function wrap(text,x,y,mw,lh){const words=text.split(' ');let line='';for(let i=0;i<words.length;i++){const test=line+words[i]+' ';if(ctx.measureText(test).width>mw&&i){ctx.fillText(line,x,y);line=words[i]+' ';y+=lh}else line=test}ctx.fillText(line,x,y)}
function drawTitle(){drawBackground();game.time+=1/60;for(const s of game.stars){s.y+=(10+s.z*18)/60;s.tw+=(1+s.z*2)/60;if(s.y>H)s.y=0}ctx.textAlign='center';ctx.shadowBlur=38;ctx.shadowColor=C.cyan;ctx.fillStyle=C.white;ctx.font='900 92px system-ui';ctx.fillText('GALAGACUS V3',W/2,208);ctx.shadowBlur=20;ctx.shadowColor=C.pink;ctx.fillStyle=C.pink;ctx.font='900 28px monospace';ctx.fillText('ARMADA RISING',W/2,252);drawShip(W/2,350,C.cyan,1.8,game.time*16,true);const pulse=.62+.38*Math.sin(performance.now()/260);ctx.globalAlpha=pulse;ctx.fillStyle=C.gold;ctx.font='900 27px monospace';ctx.fillText('PRESS ENTER / SPACE',W/2,474);ctx.globalAlpha=1;ctx.fillStyle='rgba(255,255,255,.76)';ctx.font='700 17px monospace';ctx.fillText('15-WAVE CAMPAIGN • SHIP CLASSES • CAPTURE & RESCUE • NAMED BOSSES',W/2,535);ctx.fillStyle=C.cyan;ctx.fillText('MOVE: ARROWS/WASD   FIRE: SPACE/Z   NOVA: X/B/CTRL   FOCUS: SHIFT',W/2,573);ctx.fillStyle='rgba(255,255,255,.48)';ctx.font='700 14px monospace';ctx.fillText(`PERSISTENT CREDITS ${META.credits}     VICTORIES ${META.wins}     M: SOUND`,W/2,640)}
function drawShipSelect(){drawBackground();ctx.fillStyle='rgba(0,0,0,.32)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle=C.white;ctx.shadowBlur=20;ctx.shadowColor=C.cyan;ctx.font='900 48px system-ui';ctx.fillText('CHOOSE YOUR WARSHIP',W/2,90);ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.68)';ctx.font='700 16px monospace';ctx.fillText('LEFT / RIGHT OR 1–4 • ENTER TO DEPLOY',W/2,136);const cw=255,ch=390,gap=24,start=W/2-(cw*4+gap*3)/2;for(let i=0;i<4;i++){const s=SHIPS[i],x=start+i*(cw+gap),y=210,locked=s.cost&&META.credits<s.cost,sel=i===game.selectedShip;ctx.save();ctx.shadowBlur=sel?26:10;ctx.shadowColor=s.color;ctx.fillStyle=sel?'rgba(12,18,45,.97)':'rgba(8,12,30,.88)';ctx.strokeStyle=sel?s.color:'rgba(255,255,255,.18)';ctx.lineWidth=sel?4:2;roundRect(x,y,cw,ch,20);drawShip(x+cw/2,y+95,s.color,1.25,game.time*18,sel&&s.id==='aegis');ctx.textAlign='center';ctx.fillStyle=s.color;ctx.font='900 21px system-ui';ctx.fillText((i+1)+'. '+s.name,x+cw/2,y+166);ctx.fillStyle='rgba(255,255,255,.64)';ctx.font='800 13px monospace';ctx.fillText(s.tag.toUpperCase(),x+cw/2,y+196);ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.82)';ctx.font='700 15px system-ui';wrap(s.desc,x+20,y+232,cw-40,23);ctx.fillStyle=C.cyan;ctx.font='800 13px monospace';ctx.fillText('SPD '+s.speed,x+20,y+320);ctx.fillText('LIVES '+s.lives,x+20,y+343);ctx.fillText('DMG '+s.damage,x+132,y+320);ctx.fillText('NOVA '+s.bombs,x+132,y+343);if(locked){ctx.fillStyle='rgba(0,0,0,.7)';roundRect(x+8,y+8,cw-16,ch-16,16);ctx.textAlign='center';ctx.fillStyle=C.gold;ctx.font='900 22px monospace';ctx.fillText('LOCKED',x+cw/2,y+180);ctx.font='700 14px monospace';ctx.fillText(s.cost+' CREDITS',x+cw/2,y+215)}ctx.restore()}ctx.textAlign='center';ctx.fillStyle=C.gold;ctx.font='900 18px monospace';ctx.fillText('CREDITS '+META.credits,W/2,650)}
function drawUpgrade(){drawBackground();if(player){player.draw();for(const d of drones)d.draw()}ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle=C.white;ctx.shadowBlur=22;ctx.shadowColor=C.gold;ctx.font='900 48px system-ui';ctx.fillText('ARMADA UPGRADE',W/2,108);ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,.68)';ctx.font='700 17px monospace';ctx.fillText('CHOOSE 1, 2, OR 3',W/2,156);const cw=300,ch=300,gap=36,start=W/2-(cw*3+gap*2)/2;for(let i=0;i<3;i++){const u=game.upgradeChoices[i],x=start+i*(cw+gap),y=235;ctx.save();ctx.shadowBlur=24;ctx.shadowColor=u.color;ctx.fillStyle='rgba(10,14,38,.96)';ctx.strokeStyle=u.color;ctx.lineWidth=3;roundRect(x,y,cw,ch,22);ctx.textAlign='left';ctx.fillStyle=u.color;ctx.font='900 25px system-ui';ctx.fillText((i+1)+'. '+u.title,x+22,y+40);ctx.fillStyle='rgba(255,255,255,.82)';ctx.font='700 18px system-ui';wrap(u.desc,x+22,y+96,cw-44,28);ctx.textAlign='center';ctx.fillStyle=u.color;ctx.font='900 64px monospace';const icon=u.id==='spread'?'≋':u.id==='laser'?'│':u.id==='rockets'?'▲':u.id==='orbs'?'◉':u.id==='chain'?'ϟ':u.id==='singularity'?'●':u.id==='drone'?'◆':u.id==='overdrive'?'+':u.id==='shield'?'◌':u.id==='bomb'?'✦':'1';ctx.fillText(icon,x+cw/2,y+225);ctx.fillStyle='rgba(255,255,255,.55)';ctx.font='800 13px monospace';ctx.fillText('PRESS '+(i+1),x+cw/2,y+278);ctx.restore()}ctx.fillStyle=C.gold;ctx.font='800 14px monospace';ctx.fillText('Persistent credits earned this sector: '+(75+game.wave*12),W/2,615)}
function drawEnd(win){drawBackground();ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.shadowBlur=30;ctx.shadowColor=win?C.gold:C.pink;ctx.fillStyle=win?C.gold:C.white;ctx.font='900 68px system-ui';ctx.fillText(win?'ARMADA LIBERATED':'MISSION LOST',W/2,250);ctx.shadowBlur=0;ctx.fillStyle=C.cyan;ctx.font='900 25px monospace';ctx.fillText('FINAL SCORE '+String(game.score).padStart(8,'0'),W/2,325);ctx.fillStyle='rgba(255,255,255,.72)';ctx.font='700 18px monospace';ctx.fillText(win?'NULL EMPEROR DESTROYED':'REACHED WAVE '+game.wave,W/2,370);ctx.fillStyle=C.gold;ctx.fillText('CREDITS EARNED '+game.earned,W/2,408);ctx.font='900 23px monospace';ctx.fillText('PRESS ENTER / SPACE FOR HANGAR',W/2,500);if(win){ctx.fillStyle=C.white;ctx.font='700 16px monospace';ctx.fillText('The surviving pilots call your name across every liberated star.',W/2,550)}}

function selectShipDelta(d){game.selectedShip=(game.selectedShip+d+SHIPS.length)%SHIPS.length;tone(260,.05,'square',.018,40)}
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Enter','KeyP','KeyX','KeyB','ControlLeft','Digit1','Digit2','Digit3','Digit4'].includes(e.code))e.preventDefault();ensureAudio();if(e.code==='KeyM')game.muted=!game.muted;if(game.state==='title'&&(e.code==='Enter'||e.code==='Space'))game.state='shipselect';else if(game.state==='shipselect'){if(e.code==='ArrowLeft'||e.code==='KeyA')selectShipDelta(-1);if(e.code==='ArrowRight'||e.code==='KeyD')selectShipDelta(1);if(/^Digit[1-4]$/.test(e.code))game.selectedShip=Number(e.code.slice(-1))-1;if(e.code==='Enter'||e.code==='Space')startCampaign()}else if(game.state==='upgrade'&&/^Digit[1-3]$/.test(e.code))chooseUpgrade(Number(e.code.slice(-1))-1);else if((game.state==='gameover'||game.state==='victory')&&(e.code==='Enter'||e.code==='Space'))game.state='shipselect';if(game.state==='playing'&&e.code==='KeyP')game.paused=!game.paused});window.addEventListener('keyup',e=>keys[e.code]=false);window.addEventListener('blur',()=>{if(game.state==='playing')game.paused=true});
function bind(id,code){const el=document.getElementById(id),on=e=>{e.preventDefault();keys[code]=true;ensureAudio()},off=e=>{e.preventDefault();keys[code]=false};el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);el.addEventListener('pointercancel',off);el.addEventListener('pointerleave',off)}bind('left','ArrowLeft');bind('right','ArrowRight');bind('up','ArrowUp');bind('down','ArrowDown');bind('fire','Space');bind('focus','ShiftLeft');bind('bomb','KeyX');
canvas.addEventListener('pointerdown',e=>{ensureAudio();const r=canvas.getBoundingClientRect();game.pointer.x=(e.clientX-r.left)*W/r.width;game.pointer.y=(e.clientY-r.top)*H/r.height;if(game.state==='title')game.state='shipselect';else if(game.state==='gameover'||game.state==='victory')game.state='shipselect';else if(game.state==='upgrade'){const cw=300,gap=36,start=W/2-(cw*3+gap*2)/2;for(let i=0;i<3;i++)if(game.pointer.x>=start+i*(cw+gap)&&game.pointer.x<=start+i*(cw+gap)+cw&&game.pointer.y>=235&&game.pointer.y<=535)chooseUpgrade(i)}else if(game.state==='shipselect'){const cw=255,gap=24,start=W/2-(cw*4+gap*3)/2;for(let i=0;i<4;i++)if(game.pointer.x>=start+i*(cw+gap)&&game.pointer.x<=start+i*(cw+gap)+cw&&game.pointer.y>=210&&game.pointer.y<=600){if(game.selectedShip===i)startCampaign();else game.selectedShip=i}}});
let last=performance.now();function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;if(game.state==='title')drawTitle();else if(game.state==='shipselect'){game.time+=dt;drawShipSelect()}else if(game.state==='playing'){update(dt);drawGameplay()}else if(game.state==='upgrade')drawUpgrade();else if(game.state==='gameover')drawEnd(false);else if(game.state==='victory')drawEnd(true);requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
